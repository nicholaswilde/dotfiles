---
version: '3'

vars:
  VER: '2.5'
  STOW_ARGS: '-v --adopt -t ~/'
  STOW_PACKAGES:
    sh: grep -v '^#' .stow-packages | xargs

tasks:
  update:
    desc: Update dotfiles
    cmds:
      - git pull origin main
      - task: update-assets
      - task: decrypt
      - task: restow
      - source ~/.bashrc
  update-assets:
    desc: Update external assets (fzf-git.sh, emoji.txt)
    cmds:
      - curl -fsSL "https://raw.githubusercontent.com/junegunn/fzf-git.sh/main/fzf-git.sh" -o bash/.bash/fzf-git.sh
      - curl -fsSL "https://gist.githubusercontent.com/nicholaswilde/c6e0f837c94dc5454f832be20e2d5b43/raw/emoji.txt" -o bash/.bash/emoji.txt
  agy:
    desc: Run antigravity
    cmds:
      - agy
  bootstrap:
    desc: Bootstrap dotfiles
    cmds:
      - task: decrypt
      - task: install
  decrypt:
    desc: Decrypt secrets using SOPS
    preconditions:
      - test -f {{ .TASKFILE_DIR }}/bash/.tokens.enc
      - test -f {{ .TASKFILE_DIR }}/antigravity/.antigravity/settings.json.enc
      - test -f {{ .TASKFILE_DIR }}/antigravity-cli/.gemini/antigravity-cli/mcp_config.json.enc
    cmds:
      - sops -d --input-type dotenv --output-type dotenv ./bash/.tokens.enc > ./bash/.tokens
      - sops -d --input-type json --output-type json {{ .TASKFILE_DIR }}/antigravity/.antigravity/settings.json.enc > {{ .TASKFILE_DIR }}/antigravity/.antigravity/settings.json
      - sops -d --input-type json --output-type json {{ .TASKFILE_DIR }}/antigravity-cli/.gemini/antigravity-cli/mcp_config.json.enc > {{ .TASKFILE_DIR }}/antigravity-cli/.gemini/antigravity-cli/mcp_config.json
  encrypt:
    desc: Encrypt secrets using SOPS
    preconditions:
      - test -f {{ .TASKFILE_DIR }}/bash/.tokens
      - test -f {{ .TASKFILE_DIR }}/antigravity/.antigravity/settings.json
      - test -f {{ .TASKFILE_DIR }}/antigravity-cli/.gemini/antigravity-cli/mcp_config.json
    cmds:
      - sops -e --input-type dotenv --output-type dotenv {{ .TASKFILE_DIR }}/bash/.tokens > {{ .TASKFILE_DIR }}/bash/.tokens.enc
      - sops -e --input-type json --output-type json {{ .TASKFILE_DIR }}/antigravity/.antigravity/settings.json > {{ .TASKFILE_DIR }}/antigravity/.antigravity/settings.json.enc
      - sops -e --input-type json --output-type json {{ .TASKFILE_DIR }}/antigravity-cli/.gemini/antigravity-cli/mcp_config.json > {{ .TASKFILE_DIR }}/antigravity-cli/.gemini/antigravity-cli/mcp_config.json.enc
  deps:
    desc: Install dependencies
    cmds:
      - sudo apt install -y stow
  test:
    desc: Stow each dotfile folder individually
    cmds:
      - for pkg in {{.STOW_PACKAGES}}; do stow -n {{ .STOW_ARGS }} "$pkg"; done
  install:
    desc: Stow each dotfile folder individually
    cmds:
      - for pkg in {{.STOW_PACKAGES}}; do stow {{ .STOW_ARGS }} "$pkg"; git restore "$pkg"; done
  restow:
    desc: Restow each dotfile folder individually
    cmds:
      - for pkg in {{.STOW_PACKAGES}}; do stow -R {{ .STOW_ARGS }} "$pkg"; git restore "$pkg"; done
  delete:
    desc: Delete each dotfile folder individually
    cmds:
      - for pkg in {{.STOW_PACKAGES}}; do stow -D {{ .STOW_ARGS }} "$pkg"; done
  unstow:
    desc: Run the unstow.sh script to remove stowed files from the home directory
    cmds:
      - ./unstow.sh
  create-ignore:
    desc: Create a .stow-local-ignore file in a stow package folder
    preconditions:
      - sh: 'test -n "{{.CLI_ARGS}}"'
        msg: "Stow package name not specified. Usage: task create-ignore <stow package name>"
      - sh: 'test -d "{{.CLI_ARGS}}"'
        msg: "Directory {{.CLI_ARGS}} not found"
    cmds:
      - touch {{.CLI_ARGS}}/.stow-local-ignore
  nuke:
    desc: Nuke existing files
    cmds:
      - rm ~/.config/micro/settings.json
      - rm ~/.config/gh/config.yml
      - rm ~/.antigravity/HOMELAB.md
      - rm ~/.config/gh/config.yml
  test-integration:
    desc: Run integration test inside a clean Debian Docker container
    cmds:
      - bash tests/run.sh
  default:
    cmds:
      - task -l
    silent: true
